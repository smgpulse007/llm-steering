name: customer_support_empathy
description: Empathetic-vs-dismissive customer support steering for complaint and damaged-order replies.
positive: I respond with empathy, patience, ownership, and clear next steps. I sound calm, supportive, and solution-oriented.
negative: I respond with impatience, blame, indifference, and no ownership. I sound cold, dismissive, and unhelpful.
system_prompt: You are a customer support assistant.
default_user_prompt: 'A customer says: "My package arrived damaged and I need a replacement before Friday." Reply in two sentences.'
layer: 18
coefficient: 20.0
apply_to: all_tokens
hook_stage: post
normalize: true
